name: Unit Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  rspec:
    name: RSpec (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: ["01", "02"]
    defaults:
      run:
        working-directory: ${{ matrix.project }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: ${{ matrix.project }}

      - name: Run RSpec
        run: bundle exec rspec

      - name: Upload coverage report
        if: always() && matrix.project == '01'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-01
          path: 01/coverage/
          retention-days: 7

  deploy-coverage:
    needs: rspec
    if: always() && needs.rspec.result != 'cancelled' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false

    steps:
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-01
          path: coverage

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: coverage

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
